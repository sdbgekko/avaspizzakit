<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>We haven’t made this pizza yet — Ava’s Pizza Kit</title>
<meta name="robots" content="noindex">
<style>
  :root{ --cream:#FBF8F1; --navy:#14242F; --ink:#1C2B36; --gold:#BE9A4E; --gold-lt:#E3C97F; --tomato:#9E3A24; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--navy);color:var(--cream);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    text-align:center;padding:32px 20px;}
  .wrap{max-width:540px}
  .pie{width:min(280px,72vw);height:min(280px,72vw);object-fit:cover;border-radius:50%;
    border:4px solid rgba(227,201,127,0.45);box-shadow:0 24px 60px rgba(0,0,0,.5);margin:0 auto 28px;display:block;}
  .code{font-size:15px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold-lt);margin:0 0 10px;font-weight:700}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;font-size:clamp(28px,6vw,42px);line-height:1.15;margin:0 0 16px}
  p{font-size:clamp(16px,2.4vw,18px);color:rgba(251,248,241,.82);line-height:1.6;margin:0 0 30px}
  a.btn{display:inline-block;background:var(--gold);color:var(--navy);text-decoration:none;
    font-weight:700;padding:14px 28px;border-radius:999px;font-size:16px;min-height:48px;
    box-shadow:0 10px 28px rgba(0,0,0,.35);transition:background .15s,transform .1s;}
  a.btn:hover{background:var(--gold-lt)}
  a.btn:active{transform:translateY(1px)}
  a.btn:focus-visible{outline:3px solid var(--gold-lt);outline-offset:3px}
</style>
</head>
<body>
  <main class="wrap">
    <img class="pie" src="/assets/hero-family-pizza.jpg" alt="Making a pizza in the kitchen">
    <p class="code">404</p>
    <h1>We haven’t made this pizza yet. 🍕</h1>
    <p>That page isn’t on the menu — but the good stuff is. Let’s get you back to the kitchen.</p>
    <a class="btn" href="/">← Back to Ava’s Pizza Kit</a>
  </main>
</body>
</html>
